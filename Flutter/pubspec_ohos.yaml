name: netease_callkit_ui
description: "netease callkit_ui is a ui kit about audio&video calls launched by CommsEase."
version: 4.5.0+2
repository: https://github.com/netease-kit/NECallKit
homepage: https://yunxin.163.com/

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=2.5.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  yunxin_alog: ^2.0.6
  hawk_meta: ^0.0.1
  file: ^7.0.1
  intl: any
  path_provider:
    git:
      url: https://gitcode.com/openharmony-tpc/flutter_packages.git
      path: packages/path_provider/path_provider
      ref: br_path_provider-v2.1.5_ohos
  plugin_platform_interface: ^2.1.8
  shared_preferences: 
    git:
        url: "https://gitcode.com/openharmony-tpc/flutter_packages.git"
        path: "./packages/shared_preferences/shared_preferences"
  crypto: ^3.0.7
  netease_common: ^2.0.0
  nim_core_v2:
    git:
      url: "https://github.com/netease-kit/NIM-Flutter-SDK-OHOS.git"
  fluttertoast: 
    git:
      url: "https://gitcode.com/openharmony-sig/flutter_fluttertoast.git"
  flutter_screenutil: ^5.9.3
  wakelock:
    git:
        url: "https://gitcode.com/openharmony-sig/flutter_wakelock.git"
        path: ./wakelock
  netease_callkit:
    path: ../callkit

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  intl_utils: ^2.8.8

dependency_overrides:
  path_provider:
    git:
      url: https://gitcode.com/openharmony-tpc/flutter_packages.git
      path: packages/path_provider/path_provider
      ref: br_path_provider-v2.1.5_ohos

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' specifies the class (in Java, Kotlin, Swift, Objective-C, etc.)
  # which should be registered in the plugin registry. This is required for
  # using method channels.
  # The Android 'package' specifies package in which the registered class is.
  # This is required for using method channels on Android.
  # The 'ffiPlugin' specifies that native code should be built and bundled.
  # This is required for using `dart:ffi`.
  # All these are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        package: com.netease.yunxin.flutter.plugins.callkit.ui
        pluginClass: CallKitUIPlugin
      ios:
        pluginClass: CallKitUIPlugin
      ohos:
        package: netease_callkit_ui
        pluginClass: CallkitUiPlugin

  # To add assets to your plugin package, add an assets section, like this:
  assets:
    - assets/audios/
    - assets/images/
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/assets-and-images/#from-packages
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/custom-fonts/#from-packages
